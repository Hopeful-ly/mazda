services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mazda
      POSTGRES_PASSWORD: mazda
      POSTGRES_DB: mazda
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mazda -d mazda"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mazda:mazda@db:5432/mazda?schema=public
      JWT_SECRET: change-me-in-production
      BOOKS_STORAGE_PATH: /app/data/books
      COVERS_STORAGE_PATH: /app/data/covers
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - ./data/books:/app/data/books
      - ./data/covers:/app/data/covers
    command: sh -c "bunx prisma migrate deploy && bun run start"

volumes:
  postgres_data:
